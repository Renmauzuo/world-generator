<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>World Generator</title>
</head>
<link rel="stylesheet" type="text/css" href="styles/styles.min.css?v=b2e8bbc4560c707a3eb42ec7e4c95623">

<body>
	<div class="container panel" id="control-panel"><button id="button-generate-new">Generate New World</button><br><label for="starting-node">Starting with:</label><select id="starting-node">
			<option value="multiverse">Multiverse</option>
			<option value="plane">Plane</option>
			<option value="materialPlane">Material Plane</option>
			<option value="planet">Planet</option>
		</select><label id="load-label" for="load-saved">Load saved:</label><select id="load-saved"></select><br><button id="button-import-root">Import</button><br><button id="button-export-root">Export</button><br></div>
	<div class="container" id="generation-container"></div>
	<div class="container panel" id="info-panel">
		<h2></h2><label for="name">Name:</label><input type="text" id="name">
		<div id="fields"></div><button id="button-import-selected">Import Child</button><br><button id="button-export-selected">Export</button><br>
	</div>
	<div id="statblock-modal">
		<div class="statblock-modal-content"><button id="statblock-modal-close">✕</button>
			<div id="statblock-modal-body"></div>
		</div>
	</div>
	<script src="https://code.jquery.com/jquery-3.4.1.min.js" integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
	<script src="scripts/scripts.min.js?v=3349617506e3834172377f9afa8e8209"></script>
</body>

</html>
